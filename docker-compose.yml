services:
  nmapviz:
    build:
      context: .
      dockerfile: Dockerfile
    image: nmapviz:local
    container_name: nmapviz
    ports:
      - "12221:12221"
    restart: unless-stopped
    volumes:
      - nmapviz_history:/app/history
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:12221/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  nmapviz_history:
    driver: local