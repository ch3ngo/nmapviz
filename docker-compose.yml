services:
  nmapviz:
    build: .
    container_name: nmapviz
    ports:
      - "12221:12221"
    restart: unless-stopped
    volumes:
      # Opcional: persistir los uploads entre reinicios
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:12221')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads_data: