<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117;border-radius:12px">
  <!-- Radar rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.45"/>
  <circle cx="50" cy="50" r="9"  fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.65"/>
  <!-- Crosshairs -->
  <line x1="50" y1="6"  x2="50" y2="94" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="6"  y1="50" x2="94" y2="50" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Radar sweep -->
  <path d="M50 50 L94 50 A44 44 0 0 0 50 6 Z" fill="#58a6ff" opacity="0.06"/>
  <!-- Connection lines to hosts -->
  <line x1="50" y1="50" x2="79" y2="22" stroke="#f85149" stroke-width="1.3" opacity="0.85"/>
  <line x1="50" y1="50" x2="76" y2="74" stroke="#d98634" stroke-width="1.3" opacity="0.85"/>
  <line x1="50" y1="50" x2="84" y2="50" stroke="#3fb950" stroke-width="1.3" opacity="0.85"/>
  <line x1="50" y1="50" x2="33" y2="78" stroke="#bc8cff" stroke-width="1.3" opacity="0.85"/>
  <line x1="50" y1="50" x2="22" y2="34" stroke="#3fb950" stroke-width="1.3" opacity="0.85"/>
  <!-- Host nodes -->
  <circle cx="79" cy="22" r="5"   fill="#f85149" opacity="0.9"/>
  <circle cx="76" cy="74" r="4.5" fill="#d98634" opacity="0.9"/>
  <circle cx="84" cy="50" r="4"   fill="#3fb950" opacity="0.9"/>
  <circle cx="33" cy="78" r="4"   fill="#bc8cff" opacity="0.9"/>
  <circle cx="22" cy="34" r="3.5" fill="#3fb950" opacity="0.9"/>
  <!-- Scanner center -->
  <circle cx="50" cy="50" r="7"   fill="#1f6feb"/>
  <circle cx="50" cy="50" r="7"   fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="3"   fill="#58a6ff"/>
</svg>
